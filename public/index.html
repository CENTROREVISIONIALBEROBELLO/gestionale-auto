<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Consulenze Auto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono&display=swap');
:root{--bg:#f4f3ef;--sur:#ffffff;--sur2:#eeedea;--brd:#dddbd3;--brd2:#c9c7be;--tx:#18170f;--tx2:#636158;--tx3:#9c9a91;--ac:#1e4fa3;--acl:#eaeffa;--act:#1e4fa3;--gn:#1a6b3c;--gnl:#e6f4ec;--am:#8a5200;--aml:#fef0d6;--rd:#8f1a1a;--rdl:#fde8e8;--r:12px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:13.5px;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;line-height:1.5}
.hide{display:none!important}

/* ── Login ── */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e4fa3 0%,#0d2d6b 100%);padding:20px}
.lc{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.ll{text-align:center;margin-bottom:28px}
.ll .ic{font-size:40px;margin-bottom:10px}
.ll h1{font-size:18px;font-weight:500;color:var(--tx)}
.ll p{font-size:12.5px;color:var(--tx3);margin-top:4px}

/* ── Admin layout ── */
#aa{display:flex;min-height:100vh}
.sb{width:230px;min-width:230px;background:var(--sur);border-right:.5px solid var(--brd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10}
.sb-top{padding:20px 20px 16px;border-bottom:.5px solid var(--brd)}
.sb-top .logo{display:flex;align-items:center;gap:10px}
.sb-top .logo-ic{width:36px;height:36px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-top .logo-t{font-size:13px;font-weight:500;line-height:1.3}
.sb-top .logo-s{font-size:11px;color:var(--tx3)}
.nav{flex:1;padding:10px 0}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--tx2);font-size:13px;border-left:2px solid transparent;transition:all .12s;user-select:none}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.on{background:var(--acl);color:var(--act);border-left-color:var(--ac);font-weight:500}
.ni-ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.nb.gr{background:var(--sur2);color:var(--tx3)}
.sb-bot{padding:14px 20px;border-top:.5px solid var(--brd)}
.urow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.uic{width:32px;height:32px;border-radius:50%;background:var(--acl);color:var(--act);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.un{font-size:12.5px;font-weight:500}
.ur{font-size:11px;color:var(--tx3)}
.am{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ── */
.tb{background:var(--sur);border-bottom:.5px solid var(--brd);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
.tb-t{font-size:15px;font-weight:500}
.tb-s{font-size:12px;color:var(--tx3)}
.tb-r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── Content ── */
.content{padding:22px 24px}

/* ── Cliente layout ── */
#ca{min-height:100vh;background:var(--bg)}
.ch{background:var(--ac);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ch .logo{display:flex;align-items:center;gap:10px;font-weight:500;font-size:15px}
.ch .logo span{font-size:20px}
.cb{padding:22px 24px;max-width:760px;margin:0 auto}

/* ── Forms ── */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{width:100%;padding:9px 12px;border:.5px solid var(--brd2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .12s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(30,79,163,.08)}
textarea{resize:vertical;min-height:72px;line-height:1.5}

/* ── Buttons ── */
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 16px;border-radius:var(--rs);border:.5px solid var(--brd2);background:var(--sur);color:var(--tx);transition:all .12s;white-space:nowrap;font-weight:400}
button:hover{background:var(--sur2)}
button:active{transform:scale(.98)}
.bp{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:500}
.bp:hover{background:#163f76}
.bsm{padding:5px 11px;font-size:12px}
.bdel{background:var(--rdl);color:var(--rd);border-color:#f0bebe}

/* ── Cards ── */
.card{background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);padding:18px 20px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;gap:4px}
.bam{background:var(--aml);color:var(--am)}
.bbl{background:var(--acl);color:var(--act)}
.bgn{background:var(--gnl);color:var(--gn)}
.brd2{background:var(--rdl);color:var(--rd)}
.bgr{background:var(--sur2);color:var(--tx2)}

/* ── Stat cards ── */
.sc{background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);padding:16px 18px}
.sc-l{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sc-v{font-size:28px;font-weight:300;color:var(--tx)}

/* ── Pratica row ── */
.pr{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .12s}
.pr:hover{border-color:var(--brd2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.pr-info{flex:1;min-width:0}
.pr-t{font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.pr-m{font-size:12px;color:var(--tx2)}
.pr-c{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);margin-top:3px}

/* ── File rows ── */
.fr{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);transition:background .1s}
.fr:hover{background:var(--sur2)}
.fi{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.fn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd{font-size:11px;color:var(--tx3);white-space:nowrap}
.fc{width:15px;height:15px;cursor:pointer;accent-color:var(--ac);flex-shrink:0}

/* ── Messaggi ── */
.ml{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-bottom:14px;padding:4px}
.mb{padding:10px 14px;border-radius:var(--r);max-width:80%;line-height:1.5}
.ma{background:var(--acl);color:var(--act);align-self:flex-end}
.mc{background:var(--sur2);color:var(--tx);align-self:flex-start}
.mm{font-size:10px;opacity:.5;margin-top:3px}
.mi{display:flex;gap:8px}
.mi input{flex:1}

/* ── Upload ── */
.uda{border:2px dashed var(--brd2);border-radius:var(--rs);padding:22px;text-align:center;cursor:pointer;transition:all .12s;margin-bottom:10px}
.uda:hover,.uda.drag{border-color:var(--ac);background:var(--acl)}
.uda input{display:none}
.uda-ic{font-size:28px;margin-bottom:6px}
.uda-t{font-size:13px;color:var(--tx2)}
.uda-s{font-size:11px;color:var(--tx3);margin-top:3px}

/* ── Misc ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:14.5px;font-weight:500}
.dv{height:.5px;background:var(--brd);margin:14px 0}
.muted{color:var(--tx3)}
.sm{font-size:12px}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.err{color:var(--rd);font-size:12px;margin-top:5px}
.ib{background:var(--acl);border:.5px solid #b5c8ef;border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:var(--act);margin-bottom:14px}
.wb{background:var(--aml);border:.5px solid #e8c078;border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:var(--am);margin-bottom:14px}
.empty{text-align:center;padding:52px 24px;color:var(--tx3)}
.ei{font-size:36px;margin-bottom:10px}
.sp{display:inline-block;width:13px;height:13px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:52px;color:var(--tx3)}
.tag{display:inline-block;background:var(--sur2);color:var(--tx2);font-size:10.5px;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace}

@media(max-width:700px){.sb{display:none}.am{margin-left:0}.g2,.g3{grid-template-columns:1fr}.tb,.content{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="lc">
    <div class="ll"><div class="ic">🚗</div><h1>Studio Consulenze Auto</h1><p>Portale pratiche clienti</p></div>
    <div class="fg"><label>Username</label><input id="lu" placeholder="Inserisci username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="Inserisci password"></div>
    <div id="lerr" class="err hide"></div>
    <button class="bp" id="btnLogin" style="width:100%;margin-top:10px;padding:10px">Accedi</button>
  </div>
</div>

<!-- ADMIN -->
<div id="aa" class="hide">
  <aside class="sb">
    <div class="sb-top">
      <div class="logo">
        <div class="logo-ic">🚗</div>
        <div><div class="logo-t">Consulenze Auto</div><div class="logo-s">Pannello admin</div></div>
      </div>
    </div>
    <nav class="nav">
      <div class="ni" data-nav="pratiche"><span class="ni-ic">📋</span>Pratiche<span class="nb" id="nb-p"></span></div>
      <div class="ni" data-nav="clienti"><span class="ni-ic">👤</span>Clienti<span class="nb gr" id="nb-c">0</span></div>
    </nav>
    <div class="sb-bot">
      <div class="urow"><div class="uic">AD</div><div><div class="un">Admin</div><div class="ur">Studio</div></div></div>
      <button class="bsm" id="btnLogout" style="width:100%">Esci</button>
    </div>
  </aside>
  <div class="am"><div id="ac"></div></div>
</div>

<!-- CLIENTE -->
<div id="ca" class="hide">
  <div class="ch">
    <div class="logo"><span>🚗</span>Studio Consulenze Auto</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="cl-n" style="font-size:13px;opacity:.85"></span>
      <button id="btnLogoutCl" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25)" class="bsm">Esci</button>
    </div>
  </div>
  <div class="cb" id="cc"></div>
</div>

<script>
const S = { ruolo:null, utente:null, vista:'pratiche', sel:null, form:false }
const STATI = { attesa:'In attesa', lavorazione:'In lavorazione', completata:'Completata', annullata:'Annullata' }
const SB    = { attesa:'bam', lavorazione:'bbl', completata:'bgn', annullata:'brd2' }
const STIC  = { attesa:'🕐', lavorazione:'⚙️', completata:'✅', annullata:'❌' }
const TIPI  = ['Immatricolazione','Passaggio proprietà','Revisione','Bollo','Assicurazione','Rottamazione','Duplicato','Altro']

async function api(m,u,b,fd){
  const o={method:m,headers:{}}
  if(b&&fd) o.body=b
  else if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}
  const r=await fetch(u,o); return r.json()
}
const GET=(u)=>api('GET',u)
const POST=(u,b,fd)=>api('POST',u,b,fd)
const PUT=(u,b)=>api('PUT',u,b)
const DEL=(u)=>api('DELETE',u)

window.addEventListener('DOMContentLoaded',async()=>{
  const me=await GET('/api/me')
  if(me.loggato){S.ruolo=me.ruolo;S.utente=me;avvia()}
})

function avvia(){
  el('ls').classList.add('hide')
  if(S.ruolo==='admin'){el('aa').classList.remove('hide');renderAdmin()}
  if(S.ruolo==='cliente'){el('ca').classList.remove('hide');renderCliente()}
}

// LOGIN
el('btnLogin').addEventListener('click',doLogin)
el('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
async function doLogin(){
  el('lerr').classList.add('hide')
  const r=await POST('/api/login',{username:val('lu'),password:val('lp')})
  if(r.ok){S.ruolo=r.ruolo;S.utente=r;avvia()}
  else{el('lerr').textContent=r.errore||'Errore';el('lerr').classList.remove('hide')}
}

// LOGOUT
async function doLogout(){
  await POST('/api/logout');S.ruolo=null;S.utente=null;S.sel=null;S.form=false
  el('aa').classList.add('hide');el('ca').classList.add('hide');el('ls').classList.remove('hide')
  el('lp').value=''
}
el('btnLogout').addEventListener('click',doLogout)
el('btnLogoutCl').addEventListener('click',doLogout)

// ADMIN
function renderAdmin(){
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('on',n.dataset.nav===S.vista)
    n.onclick=()=>{S.vista=n.dataset.nav;S.form=false;S.sel=null;renderAdmin()}
  })
  if(S.vista==='pratiche'&&S.sel){renderDettaglio(true);return}
  if(S.vista==='pratiche'){renderPratiche();return}
  if(S.vista==='clienti'){renderClienti();return}
}

// PRATICHE LIST
async function renderPratiche(){
  const c=el('ac')
  c.innerHTML=`<div class="tb"><div><div class="tb-t">Pratiche</div></div><div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div></div><div class="content"><div class="loading"><span class="sp"></span> Caricamento...</div></div>`
  const [pratiche,clienti]=await Promise.all([GET('/api/pratiche'),GET('/api/clienti')])
  el('nb-p').textContent=pratiche.length||''
  const rows=pratiche.map(p=>{
    const cl=clienti.find(c=>c.id===p.clienteId)
    const vis=(p.files||[]).filter(f=>f.visibile).length
    return `<div class="pr" data-pid="${p.id}">
      <div class="pr-info">
        <div class="pr-t">${p.titolo}</div>
        <div class="pr-m">${cl?cl.nome:'—'} · ${p.tipo} · Targa: <strong>${p.targa||'—'}</strong> · Scad: ${p.scadenza||'—'} · ${vis} doc visibili</div>
        <div class="pr-c">N° ${p.numero||p.id} · Cliente: ${cl?cl.codice:'—'}</div>
      </div>
      <span class="badge ${SB[p.stato]}">${STIC[p.stato]} ${STATI[p.stato]}</span>
    </div>`
  }).join('')
  c.innerHTML=`
  <div class="tb">
    <div><div class="tb-t">Pratiche</div><div class="tb-s">${pratiche.length} totali</div></div>
    <div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div>
  </div>
  <div class="content">
    ${S.form?await tFormPratica(clienti):''}
    ${!pratiche.length&&!S.form?`<div class="empty"><div class="ei">📋</div><p>Nessuna pratica ancora.<br>Clicca "+ Nuova pratica" per iniziare.</p></div>`:''}
    ${rows}
  </div>`
  el('btnNP').onclick=()=>{S.form=!S.form;renderAdmin()}
  document.querySelectorAll('[data-pid]').forEach(r=>{
    r.onclick=e=>{if(e.target.closest('button'))return;S.sel=r.dataset.pid;renderAdmin()}
  })
  if(S.form)bindFormPratica(clienti)
}

async function tFormPratica(clienti){
  const co=clienti.map(c=>`<option value="${c.id}">${c.codice} — ${c.nome}</option>`).join('')
  const to=TIPI.map(t=>`<option>${t}</option>`).join('')
  const so=Object.entries(STATI).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')
  return `<div class="card" style="border-color:var(--ac);margin-bottom:16px">
    <div class="sh"><span class="st">Nuova pratica</span></div>
    <div class="g2">
      <div class="fg"><label>Cliente</label><select id="np-cl">${co}</select></div>
      <div class="fg"><label>Tipo</label><select id="np-tipo">${to}</select></div>
      <div class="fg"><label>Numero pratica</label><input id="np-num" placeholder="es. 2024-001"></div>
      <div class="fg"><label>Titolo</label><input id="np-titolo" placeholder="es. Immatricolazione Fiat 500"></div>
      <div class="fg"><label>Targa</label><input id="np-targa" placeholder="AB123CD"></div>
      <div class="fg"><label>Scadenza</label><input id="np-scad" type="date"></div>
      <div class="fg"><label>Stato</label><select id="np-stato">${so}</select></div>
    </div>
    <div class="fg"><label>Note interne</label><textarea id="np-note" placeholder="Visibili solo all'admin..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="bp" id="btnSalvaP">Salva pratica</button>
      <button id="btnAnnullaP">Annulla</button>
    </div>
  </div>`
}
function bindFormPratica(clienti){
  el('btnAnnullaP').onclick=()=>{S.form=false;renderAdmin()}
  el('btnSalvaP').onclick=async()=>{
    const titolo=val('np-titolo').trim(),clienteId=val('np-cl')
    if(!titolo||!clienteId){alert('Inserisci titolo e cliente');return}
    await POST('/api/pratiche',{titolo,clienteId,numero:val('np-num'),tipo:val('np-tipo'),targa:val('np-targa'),stato:val('np-stato'),scadenza:val('np-scad'),note:val('np-note')})
    S.form=false;renderAdmin()
  }
}

// DETTAGLIO
async function renderDettaglio(isAdmin){
  const c=el('ac')
  c.innerHTML=`<div class="loading"><span class="sp"></span> Caricamento...</div>`
  const p=await GET(`/api/pratiche/${S.sel}`)
  const cl=isAdmin?(await GET('/api/clienti')).find(x=>x.id===p.clienteId):null
  const files=p.files||[]
  const vf=isAdmin?files:files.filter(f=>f.visibile)
  const so=Object.entries(STATI).map(([k,v])=>`<option value="${k}" ${p.stato===k?'selected':''}>${v}</option>`).join('')

  c.innerHTML=`
  <div class="tb">
    <button class="bsm" id="btnBack">← Indietro</button>
    <div style="margin-left:8px">
      <div class="tb-t">${p.titolo}</div>
      <div class="tb-s">N° ${p.numero||p.id}${cl?' · '+cl.nome:''}</div>
    </div>
    ${isAdmin?`<div class="tb-r">
      <select id="selS" style="width:auto">${so}</select>
      <button class="bdel bsm" id="btnDelP">Elimina</button>
    </div>`:`<div class="tb-r"><span class="badge ${SB[p.stato]}">${STIC[p.stato]} ${STATI[p.stato]}</span></div>`}
  </div>
  <div class="content">
    <div class="card">
      <div class="g3">
        <div><div class="sm muted">Tipo</div><div style="font-weight:500;margin-top:2px">${p.tipo}</div></div>
        <div><div class="sm muted">Targa</div><div style="font-weight:500;font-size:16px;margin-top:2px">${p.targa||'—'}</div></div>
        <div><div class="sm muted">Scadenza</div><div style="font-weight:500;margin-top:2px">${p.scadenza||'—'}</div></div>
      </div>
      ${p.note&&isAdmin?`<div class="dv"></div><div class="sm" style="color:var(--tx2);font-style:italic">${p.note}</div>`:''}
    </div>

    <div class="card">
      <div class="sh">
        <span class="st">Documenti${isAdmin?` <span class="sm muted">(${files.filter(f=>f.visibile).length} visibili al cliente)</span>`:` (${vf.length})`}</span>
        ${isAdmin?`<div style="display:flex;gap:6px">
          <button class="bsm" id="btnSelT">✓ Tutti</button>
          <button class="bsm" id="btnDesT">✗ Nessuno</button>
        </div>`:''}
      </div>
      ${isAdmin?`<div class="uda" id="dz">
        <input type="file" id="fi" multiple>
        <div class="uda-ic">📁</div>
        <div class="uda-t">Trascina i file qui oppure <strong>clicca per selezionare</strong></div>
        <div class="uda-s">Qualsiasi formato · Max 50MB per file</div>
      </div>
      <div id="us" class="sm muted" style="margin-bottom:8px"></div>`:''}
      ${!vf.length?`<div class="sm muted" style="padding:8px 0">Nessun documento disponibile.</div>`:''}
      <div id="fl">${vf.map(f=>tFR(f,isAdmin)).join('')}</div>
    </div>

    <div class="card">
      <div class="sh"><span class="st">Messaggi</span></div>
      <div class="ml" id="ml">
        ${!(p.messaggi||[]).length?`<div class="sm muted">Nessun messaggio.</div>`:''}
        ${(p.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Cliente'} · ${m.ts}</div></div>`).join('')}
      </div>
      <div class="mi"><input id="nm" placeholder="Scrivi un messaggio..."><button class="bp" id="btnM">Invia</button></div>
    </div>
  </div>`

  el('btnBack').onclick=()=>{S.sel=null;renderAdmin()}

  if(isAdmin){
    const ss=el('selS')
    if(ss) ss.onchange=async()=>{await PUT(`/api/pratiche/${p.id}`,{stato:ss.value});renderAdmin()}
    el('btnDelP').onclick=async()=>{
      if(!confirm('Eliminare questa pratica?'))return
      await DEL(`/api/pratiche/${p.id}`);S.sel=null;renderAdmin()
    }
    el('btnSelT').onclick=async()=>{
      for(const f of p.files||[]) await PUT(`/api/pratiche/${p.id}/files/${f.id}`,{visibile:true})
      renderAdmin()
    }
    el('btnDesT').onclick=async()=>{
      for(const f of p.files||[]) await PUT(`/api/pratiche/${p.id}/files/${f.id}`,{visibile:false})
      renderAdmin()
    }
    const dz=el('dz'),fi=el('fi')
    dz.onclick=()=>fi.click()
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')}
    dz.ondragleave=()=>dz.classList.remove('drag')
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');uploadF(e.dataTransfer.files)}
    fi.onchange=()=>uploadF(fi.files)
    async function uploadF(files){
      if(!files.length)return
      el('us').innerHTML='<span class="sp"></span> Caricamento in corso...'
      const fd=new FormData()
      for(const f of files) fd.append('files',f)
      const nuovi=await POST(`/api/pratiche/${p.id}/files`,fd,true)
      el('us').textContent=`${nuovi.length} file caricati ✓`
      const p2=await GET(`/api/pratiche/${p.id}`)
      el('fl').innerHTML=p2.files.map(f=>tFR(f,true)).join('')
      bindFC(p.id)
    }
    bindFC(p.id)
  }

  const invia=async()=>{
    const inp=el('nm'),txt=inp.value.trim();if(!txt)return
    await POST(`/api/pratiche/${p.id}/messaggi`,{testo:txt})
    inp.value=''
    const p2=await GET(`/api/pratiche/${p.id}`)
    el('ml').innerHTML=(p2.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Cliente'} · ${m.ts}</div></div>`).join('')
    el('ml').scrollTop=el('ml').scrollHeight
  }
  el('btnM').onclick=invia
  el('nm').addEventListener('keydown',e=>{if(e.key==='Enter')invia()})
  el('ml').scrollTop=el('ml').scrollHeight
}

function tFR(f,isAdmin){
  return `<div class="fr" id="fr-${f.id}">
    <span class="fi">${icF(f.nome)}</span>
    <span class="fn" title="${f.nome}">${f.nome}</span>
    <span class="fd">${fmtD(f.dim)}</span>
    ${isAdmin?`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0">
      <input type="checkbox" class="fc fv" data-fid="${f.id}" ${f.visibile?'checked':''}><span class="sm muted">visibile</span>
    </label>
    <button class="bsm bdel df" data-fid="${f.id}" style="padding:3px 8px">✕</button>`:''}
    <a href="${f.url}" target="_blank" style="text-decoration:none" class="bsm">↗ Apri</a>
  </div>`
}

function bindFC(pid){
  document.querySelectorAll('.fv').forEach(cb=>{
    cb.onchange=async()=>await PUT(`/api/pratiche/${pid}/files/${cb.dataset.fid}`,{visibile:cb.checked})
  })
  document.querySelectorAll('.df').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('Eliminare questo file?'))return
      await DEL(`/api/pratiche/${pid}/files/${btn.dataset.fid}`)
      el('fr-'+btn.dataset.fid)?.remove()
    }
  })
}

// CLIENTI
async function renderClienti(){
  const c=el('ac')
  c.innerHTML=`<div class="tb"><div class="tb-t">Clienti</div><div class="tb-r"><button class="bp" id="btnNC">+ Nuovo cliente</button></div></div><div class="content"><div class="loading"><span class="sp"></span></div></div>`
  const clienti=await GET('/api/clienti')
  el('nb-c').textContent=clienti.length
  c.innerHTML=`
  <div class="tb">
    <div><div class="tb-t">Clienti</div><div class="tb-s">${clienti.length} registrati</div></div>
    <div class="tb-r"><button class="bp" id="btnNC">+ Nuovo cliente</button></div>
  </div>
  <div class="content">
    ${S.form?`<div class="card" style="border-color:var(--ac);margin-bottom:16px">
      <div class="sh"><span class="st">Nuovo cliente</span></div>
      <div class="ib">Il codice viene assegnato automaticamente dal sistema</div>
      <div class="g2">
        <div class="fg"><label>Nome completo</label><input id="nc-n" placeholder="Mario Rossi"></div>
        <div class="fg"><label>Email</label><input id="nc-e" placeholder="mario@email.it"></div>
        <div class="fg"><label>Telefono</label><input id="nc-t" placeholder="348 0000000"></div>
        <div class="fg"><label>Username accesso</label><input id="nc-u" placeholder="mario.rossi"></div>
        <div class="fg"><label>Password accesso</label><input id="nc-p" placeholder="Password"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="bp" id="btnSC">Salva cliente</button>
        <button id="btnAC">Annulla</button>
      </div>
    </div>`:''}
    ${!clienti.length&&!S.form?`<div class="empty"><div class="ei">👤</div><p>Nessun cliente ancora.</p></div>`:''}
    ${clienti.map(cl=>{
      const np=0
      return `<div class="card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
          <div>
            <div style="font-weight:500;font-size:14px">${cl.nome} <span class="tag">${cl.codice}</span></div>
            <div class="sm muted" style="margin-top:4px">${cl.email||''} ${cl.telefono?'· '+cl.telefono:''}</div>
            <div class="sm" style="margin-top:5px">
              Accesso: <span class="mono">${cl.username}</span> / <span class="mono">${cl.password}</span>
            </div>
          </div>
          <button class="bdel bsm dcl" data-id="${cl.id}">Elimina</button>
        </div>
      </div>`
    }).join('')}
  </div>`
  el('btnNC').onclick=()=>{S.form=!S.form;renderAdmin()}
  if(el('btnAC')) el('btnAC').onclick=()=>{S.form=false;renderAdmin()}
  if(el('btnSC')) el('btnSC').onclick=async()=>{
    const nome=val('nc-n').trim(),username=val('nc-u').trim(),password=val('nc-p').trim()
    if(!nome||!username||!password){alert('Compila nome, username e password');return}
    await POST('/api/clienti',{nome,email:val('nc-e'),telefono:val('nc-t'),username,password})
    S.form=false;renderAdmin()
  }
  document.querySelectorAll('.dcl').forEach(b=>{
    b.onclick=async()=>{
      if(!confirm('Eliminare questo cliente?'))return
      await DEL('/api/clienti/'+b.dataset.id);renderAdmin()
    }
  })
}

// CLIENTE PORTALE
async function renderCliente(){
  el('cl-n').textContent=S.utente.nome+' · '+(S.utente.codice||'')
  if(S.sel){
    const cc=el('cc')
    cc.innerHTML=`<div class="loading"><span class="sp"></span> Caricamento...</div>`
    const p=await GET(`/api/pratiche/${S.sel}`)
    const vf=(p.files||[]).filter(f=>f.visibile)
    cc.innerHTML=`
      <button class="bsm" id="btnBCl" style="margin-bottom:16px">← Le mie pratiche</button>
      <div class="card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div style="font-weight:500;font-size:15px">${p.titolo}</div>
            <div class="sm muted" style="margin-top:3px">Pratica n° ${p.numero||p.id}</div>
          </div>
          <span class="badge ${SB[p.stato]}">${STIC[p.stato]} ${STATI[p.stato]}</span>
        </div>
        <div class="dv"></div>
        <div class="g3">
          <div><div class="sm muted">Tipo</div><div style="font-weight:500;margin-top:2px">${p.tipo}</div></div>
          <div><div class="sm muted">Targa</div><div style="font-weight:500;font-size:16px;margin-top:2px">${p.targa||'—'}</div></div>
          <div><div class="sm muted">Scadenza</div><div style="font-weight:500;margin-top:2px">${p.scadenza||'—'}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="sh"><span class="st">Documenti (${vf.length})</span></div>
        ${!vf.length?`<div class="sm muted">Nessun documento disponibile al momento.</div>`:''}
        ${vf.map(f=>`<div class="fr">
          <span class="fi">${icF(f.nome)}</span>
          <span class="fn">${f.nome}</span>
          <span class="fd">${fmtD(f.dim)}</span>
          <a href="${f.url}" target="_blank" style="text-decoration:none" class="bsm">↗ Apri</a>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="sh"><span class="st">Messaggi con lo studio</span></div>
        <div class="ml" id="ml">
          ${!(p.messaggi||[]).length?`<div class="sm muted">Nessun messaggio.</div>`:''}
          ${(p.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Tu'} · ${m.ts}</div></div>`).join('')}
        </div>
        <div class="mi"><input id="nm" placeholder="Scrivi un messaggio allo studio..."><button class="bp" id="btnM">Invia</button></div>
      </div>`
    el('btnBCl').onclick=()=>{S.sel=null;renderCliente()}
    el('ml').scrollTop=el('ml').scrollHeight
    const invia=async()=>{
      const inp=el('nm'),txt=inp.value.trim();if(!txt)return
      await POST(`/api/pratiche/${p.id}/messaggi`,{testo:txt})
      inp.value=''
      const p2=await GET(`/api/pratiche/${p.id}`)
      el('ml').innerHTML=(p2.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Tu'} · ${m.ts}</div></div>`).join('')
      el('ml').scrollTop=el('ml').scrollHeight
    }
    el('btnM').onclick=invia
    el('nm').addEventListener('keydown',e=>{if(e.key==='Enter')invia()})
    return
  }
  const pratiche=await GET('/api/pratiche')
  el('cc').innerHTML=`
    <div class="g2" style="margin-bottom:20px">
      <div class="sc"><div class="sc-l">Pratiche totali</div><div class="sc-v">${pratiche.length}</div></div>
      <div class="sc"><div class="sc-l">In lavorazione</div><div class="sc-v">${pratiche.filter(p=>p.stato==='lavorazione').length}</div></div>
    </div>
    ${!pratiche.length?`<div class="empty"><div class="ei">📂</div><p>Nessuna pratica al momento.<br>Contatta lo studio per informazioni.</p></div>`:''}
    ${pratiche.map(p=>{
      const vis=(p.files||[]).filter(f=>f.visibile).length
      return `<div class="pr" data-pid="${p.id}">
        <div class="pr-info">
          <div class="pr-t">${p.titolo}</div>
          <div class="pr-m">Targa: <strong>${p.targa||'—'}</strong> · Scad: ${p.scadenza||'—'} · ${vis} documenti disponibili</div>
          <div class="pr-c">Pratica n° ${p.numero||p.id}</div>
        </div>
        <span class="badge ${SB[p.stato]}">${STIC[p.stato]} ${STATI[p.stato]}</span>
      </div>`
    }).join('')}`
  document.querySelectorAll('[data-pid]').forEach(r=>{
    r.onclick=()=>{S.sel=r.dataset.pid;renderCliente()}
  })
}

function el(id){return document.getElementById(id)}
function val(id,s){const e=el(id);if(!e)return'';if(s!==undefined){e.value=s;return}return e.value}
function icF(n=''){const e=n.split('.').pop().toLowerCase();return{pdf:'📄',jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜',rar:'🗜',mp4:'🎬',mov:'🎬',mp3:'🎵'}[e]||'📁'}
function fmtD(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
</script>
