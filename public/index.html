<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Revisioni Alberobello</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --sur: #1a1d27;
  --sur2: #222535;
  --sur3: #2a2e40;
  --brd: rgba(255,255,255,.07);
  --brd2: rgba(255,255,255,.12);
  --tx: #f0f0f0;
  --tx2: #9ca3af;
  --tx3: #6b7280;
  --ac: #e63946;
  --acl: rgba(230,57,70,.12);
  --act: #ff6b76;
  --gn: #22c55e;
  --gnl: rgba(34,197,94,.12);
  --am: #f59e0b;
  --aml: rgba(245,158,11,.12);
  --rd: #ef4444;
  --rdl: rgba(239,68,68,.12);
  --r: 12px;
  --rs: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13.5px;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh}
.hide{display:none!important}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sur3);border-radius:4px}

/* ── Login ── */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(230,57,70,.15) 0%,transparent 60%),var(--bg);padding:20px}
.lc{background:var(--sur);border:1px solid var(--brd);border-radius:20px;padding:44px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.ll{text-align:center;margin-bottom:32px}
.ll img{width:160px;height:auto;margin-bottom:16px;filter:brightness(1.1)}
.ll h1{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--tx2)}

/* ── Admin layout ── */
#aa{display:flex;min-height:100vh}
.sb{width:240px;min-width:240px;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10}
.sb-top{padding:22px 20px 18px;border-bottom:1px solid var(--brd)}
.sb-top img{width:140px;height:auto;filter:brightness(1.1)}
.nav{flex:1;padding:10px 10px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;color:var(--tx2);font-size:13px;border-radius:var(--rs);transition:all .15s;margin-bottom:2px;font-weight:500}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.on{background:var(--acl);color:var(--act);font-weight:600}
.ni-ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.nb.gr{background:var(--sur3);color:var(--tx3)}
.sb-bot{padding:16px;border-top:1px solid var(--brd)}
.urow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.uic{width:34px;height:34px;border-radius:50%;background:var(--acl);color:var(--act);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(230,57,70,.3)}
.un{font-size:13px;font-weight:600}
.ur{font-size:11px;color:var(--tx3)}
.am{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ── */
.tb{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}
.tb-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;letter-spacing:.02em}
.tb-s{font-size:12px;color:var(--tx3)}
.tb-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{padding:24px}

/* ── Cliente layout ── */
#ca{min-height:100vh;background:var(--bg)}
.ch{background:var(--sur);border-bottom:1px solid var(--brd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.ch img{height:36px;width:auto;filter:brightness(1.1)}
.cb{padding:24px;max-width:780px;margin:0 auto}

/* ── Forms ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
input,select,textarea{width:100%;padding:10px 13px;border:1px solid var(--brd2);border-radius:var(--rs);background:var(--sur2);color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;transition:all .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac);background:var(--sur3);box-shadow:0 0 0 3px rgba(230,57,70,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
select option{background:var(--sur2);color:var(--tx)}

/* ── Buttons ── */
button{cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border-radius:var(--rs);border:1px solid var(--brd2);background:var(--sur2);color:var(--tx);transition:all .15s;white-space:nowrap}
button:hover{background:var(--sur3);border-color:var(--brd)}
button:active{transform:scale(.98)}
.bp{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.bp:hover{background:#c1121f;border-color:#c1121f}
.bsm{padding:6px 12px;font-size:12px}
.bdel{background:var(--rdl);color:#fc8181;border-color:rgba(239,68,68,.25)}
.bdel:hover{background:rgba(239,68,68,.2)}

/* ── Cards ── */
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 11px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.bam{background:var(--aml);color:var(--am)}
.bbl{background:var(--acl);color:var(--act)}
.bgn{background:var(--gnl);color:var(--gn)}
.brd2{background:var(--rdl);color:var(--rd)}
.bgr{background:var(--sur3);color:var(--tx2)}

/* ── Stat ── */
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);opacity:.5}
.sc-l{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sc-v{font-size:32px;font-weight:300;color:var(--tx)}

/* ── Pratica row ── */
.pr{display:flex;align-items:flex-start;gap:16px;padding:16px 20px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.pr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);opacity:0;transition:opacity .15s}
.pr:hover{border-color:var(--brd2);background:var(--sur2);transform:translateX(2px)}
.pr:hover::before{opacity:1}
.pr-info{flex:1;min-width:0}
.pr-t{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.pr-m{font-size:12px;color:var(--tx2);margin-bottom:3px}
.pr-c{font-family:'Inter',monospace;font-size:11px;color:var(--tx3)}

/* ── File rows ── */
.fr{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--rs);transition:background .12s;border:1px solid transparent}
.fr:hover{background:var(--sur2);border-color:var(--brd)}
.fi{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.fn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd{font-size:11px;color:var(--tx3);white-space:nowrap}
.fc{width:15px;height:15px;cursor:pointer;accent-color:var(--ac);flex-shrink:0}

/* ── Messaggi ── */
.ml{display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;margin-bottom:16px;padding:4px}
.mb{padding:11px 15px;border-radius:var(--r);max-width:80%;line-height:1.5;font-size:13px}
.ma{background:var(--acl);color:var(--act);align-self:flex-end;border:1px solid rgba(230,57,70,.2)}
.mc{background:var(--sur2);color:var(--tx);align-self:flex-start;border:1px solid var(--brd)}
.mm{font-size:10px;opacity:.45;margin-top:4px}
.mi{display:flex;gap:8px}
.mi input{flex:1}

/* ── Upload ── */
.uda{border:2px dashed var(--brd2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px;background:var(--sur2)}
.uda:hover,.uda.drag{border-color:var(--ac);background:var(--acl)}
.uda input{display:none}
.uda-ic{font-size:32px;margin-bottom:8px}
.uda-t{font-size:13px;color:var(--tx2);font-weight:500}
.uda-s{font-size:11px;color:var(--tx3);margin-top:4px}

/* ── Sezione header ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em}
.dv{height:1px;background:var(--brd);margin:16px 0}
.muted{color:var(--tx3)}
.sm{font-size:12px}
.mono{font-family:'Inter',monospace;font-size:12px}
.err{color:#fc8181;font-size:12px;margin-top:6px}
.ib{background:var(--acl);border:1px solid rgba(230,57,70,.2);border-radius:var(--rs);padding:12px 15px;font-size:12.5px;color:var(--act);margin-bottom:14px}
.wb{background:var(--aml);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);padding:12px 15px;font-size:12.5px;color:var(--am);margin-bottom:14px}
.ok{background:var(--gnl);border:1px solid rgba(34,197,94,.2);border-radius:var(--rs);padding:12px 15px;font-size:12.5px;color:var(--gn);margin-bottom:14px}
.empty{text-align:center;padding:60px 24px;color:var(--tx3)}
.ei{font-size:40px;margin-bottom:12px}
.sp{display:inline-block;width:13px;height:13px;border:2px solid var(--sur3);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;color:var(--tx3)}
.tag{display:inline-block;background:var(--sur3);color:var(--tx2);font-size:10.5px;padding:2px 8px;border-radius:4px;font-family:monospace;font-weight:600}

/* ── Edit inline ── */
.edit-field{display:flex;align-items:center;gap:8px}
.edit-field input,.edit-field select{flex:1;padding:6px 10px;font-size:13px}
.edit-field .save-btn{padding:5px 10px;font-size:11px}
.field-val{cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .12s;display:inline-block}
.field-val:hover{background:var(--sur2)}
.field-val::after{content:' ✎';font-size:10px;opacity:.4;margin-left:4px}

@media(max-width:768px){.sb{display:none}.am{margin-left:0}.g2,.g3{grid-template-columns:1fr}.tb,.content,.cb{padding-left:16px;padding-right:16px}}
</style>
</head>

const S = { ruolo:null, utente:null, vista:'pratiche', sel:null, form:false }
const STATI = { attesa:'In attesa', lavorazione:'In lavorazione', completata:'Completata', annullata:'Annullata' }
const SB    = { attesa:'bam', lavorazione:'bbl', completata:'bgn', annullata:'brd2' }
const STIC  = { attesa:'🕐', lavorazione:'⚙️', completata:'✅', annullata:'❌' }
const TIPI  = ['Immatricolazione','Passaggio di proprietà','Revisione','Bollo','Assicurazione','Rottamazione','Duplicato targa','Carta di circolazione','Altro']

async function api(m,u,b,fd){
  const o={method:m,headers:{}}
  if(b&&fd) o.body=b
  else if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}
  const r=await fetch(u,o);return r.json()
}
const GET=u=>api('GET',u)
const POST=(u,b,fd)=>api('POST',u,b,fd)
const PUT=(u,b)=>api('PUT',u,b)
const DEL=u=>api('DELETE',u)

window.addEventListener('DOMContentLoaded',async()=>{
  const me=await GET('/api/me')
  if(me.loggato){S.ruolo=me.ruolo;S.utente=me;avvia()}
})

function avvia(){
  el('ls').classList.add('hide')
  if(S.ruolo==='admin'){el('aa').classList.remove('hide');renderAdmin()}
  if(S.ruolo==='cliente'){el('ca').classList.remove('hide');renderCliente()}
}

el('btnLogin').addEventListener('click',doLogin)
el('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
async function doLogin(){
  el('lerr').classList.add('hide')
  const r=await POST('/api/login',{username:val('lu'),password:val('lp')})
  if(r.ok){S.ruolo=r.ruolo;S.utente=r;avvia()}
  else{el('lerr').textContent=r.errore||'Errore';el('lerr').classList.remove('hide')}
}
async function doLogout(){
  await POST('/api/logout');S.ruolo=null;S.utente=null;S.sel=null;S.form=false
  el('aa').classList.add('hide');el('ca').classList.add('hide');el('ls').classList.remove('hide')
  el('lp').value=''
}
el('btnLogout').addEventListener('click',doLogout)
el('btnLogoutCl').addEventListener('click',doLogout)

function renderAdmin(){
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('on',n.dataset.nav===S.vista)
    n.onclick=()=>{S.vista=n.dataset.nav;S.form=false;S.sel=null;renderAdmin()}
  })
  if(S.vista==='pratiche'&&S.sel){renderDettaglio(true);return}
  if(S.vista==='pratiche'){renderPratiche();return}
  if(S.vista==='clienti'){renderClienti();return}
}

async function renderPratiche(){
  const c=el('ac')
  c.innerHTML=`<div class="tb"><div><div class="tb-t">Pratiche</div></div><div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div></div><div class="content"><div class="loading"><span class="sp"></span> Caricamento...</div></div>`
  const [pratiche,clienti]=await Promise.all([GET('/api/pratiche'),GET('/api/clienti')])
  el('nb-p').textContent=pratiche.length||''
  const rows=pratiche.map(p=>{
    const cl=clienti.find(c=>c.id===p.clienteId)
    const vis=(p.files||[]).filter(f=>f.visibile).length
    return `<div class="pr" data-pid="${p.id}">
      <div class="pr-info">
        <div class="pr-t">${p.titolo}</div>
        <div class="pr-m">${cl?cl.nome:'—'} · ${p.tipo} · Targa: <strong>${p.targa||'—'}</strong> · Scad: ${p.scadenza||'—'} · ${vis} doc visibili</div>
        <div class="pr-c">N° ${p.numero||p.id} · <span class="tag">${cl?cl.codice:'—'}</span></div>
      </div>
      <span class="badge ${SB[p.stato]}">${STIC[p.stato]} ${STATI[p.stato]}</span>
    </div>`
  }).join('')
  c.innerHTML=`
  <div class="tb">
    <div><div class="tb-t">Pratiche</div><div class="tb-s">${pratiche.length} totali</div></div>
    <div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div>
  </div>
  <div class="content">
    ${S.form?await tFormPratica(clienti):''}
    ${!pratiche.length&&!S.form?`<div class="empty"><div class="ei">📋</div><p style="font-size:14px;font-weight:500;margin-bottom:8px">Nessuna pratica</p><p>Clicca "+ Nuova pratica" per iniziare</p></div>`:''}
    ${rows}
  </div>`
  el('btnNP').onclick=()=>{S.form=!S.form;renderAdmin()}
  document.querySelectorAll('[data-pid]').forEach(r=>{
    r.onclick=e=>{if(e.target.closest('button'))return;S.sel=r.dataset.pid;renderAdmin()}
  })
  if(S.form)bindFormPratica(clienti)
}

async function tFormPratica(clienti){
  const co=clienti.map(c=>`<option value="${c.id}">${c.codice} — ${c.nome}</option>`).join('')
  const to=TIPI.map(t=>`<option>${t}</option>`).join('')
  const so=Object.entries(STATI).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')
  return `<div class="card" style="border-color:rgba(230,57,70,.3);margin-bottom:16px">
    <div class="sh"><span class="st">Nuova pratica</span></div>
    <div class="g2">
      <div class="fg"><label>Cliente</label><select id="np-cl">${co}</select></div>
      <div class="fg"><label>Tipo servizio</label><select id="np-tipo">${to}</select></div>
      <div class="fg"><label>Numero pratica</label><input id="np-num" placeholder="es. 2024-001"></div>
      <div class="fg"><label>Titolo</label><input id="np-titolo" placeholder="es. Immatricolazione Fiat 500"></div>
      <div class="fg"><label>Targa</label><input id="np-targa" placeholder="AB123CD" style="text-transform:uppercase"></div>
      <div class="fg"><label>Scadenza</label><input id="np-scad" type="date"></div>
      <div class="fg"><label>Stato</label><select id="np-stato">${so}</select></div>
    </div>
    <div class="fg"><label>Note interne</label><textarea id="np-note" placeholder="Visibili solo all'admin..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="bp" id="btnSalvaP">Salva pratica</button>
      <button id="btnAnnullaP">Annulla</button>
    </div>
  </div>`
}
function bindFormPratica(clienti){
  el('btnAnnullaP').onclick=()=>{S.form=false;renderAdmin()}
  el('btnSalvaP').onclick=async()=>{
    const titolo=val('np-titolo').trim(),clienteId=val('np-cl')
    if(!titolo||!clienteId){alert('Inserisci titolo e cliente');return}
    await POST('/api/pratiche',{titolo,clienteId,numero:val('np-num'),tipo:val('np-tipo'),targa:val('np-targa').toUpperCase(),stato:val('np-stato'),scadenza:val('np-scad'),note:val('np-note')})
    S.form=false;renderAdmin()
  }
}

async function renderDettaglio(isAdmin){
  const c=el('ac')
  c.innerHTML=`<div class="loading"><span class="sp"></span> Caricamento...</div>`
  const p=await GET(\`/api/pratiche/\${S.sel}\`)
  const clienti=isAdmin?await GET('/api/clienti'):[]
  const cl=isAdmin?clienti.find(x=>x.id===p.clienteId):null
  const files=p.files||[]
  const vf=isAdmin?files:files.filter(f=>f.visibile)
  const so=Object.entries(STATI).map(([k,v])=>`<option value="${k}" \${p.stato===k?'selected':''}>${v}</option>`).join('')
  const to=TIPI.map(t=>`<option \${p.tipo===t?'selected':''}>${t}</option>`).join('')
  const clOpts=isAdmin?clienti.map(c=>`<option value="\${c.id}" \${c.id===p.clienteId?'selected':''}>\${c.codice} — \${c.nome}</option>`).join(''):''

  c.innerHTML=\`
  <div class="tb">
    <button class="bsm" id="btnBack" style="background:var(--sur2)">← Indietro</button>
    <div style="margin-left:8px">
      <div class="tb-t">\${p.titolo}</div>
      <div class="tb-s">N° \${p.numero||p.id}\${cl?' · '+cl.nome:''}</div>
    </div>
    \${isAdmin?\`<div class="tb-r">
      <span class="badge \${SB[p.stato]}">\${STIC[p.stato]} \${STATI[p.stato]}</span>
      <button class="bdel bsm" id="btnDelP">Elimina</button>
    </div>\`:\`<div class="tb-r"><span class="badge \${SB[p.stato]}">\${STIC[p.stato]} \${STATI[p.stato]}</span></div>\`}
  </div>
  <div class="content">

    \${isAdmin?\`<div class="card">
      <div class="sh"><span class="st">Dati pratica</span><span class="sm muted">Clicca su un campo per modificarlo</span></div>
      <div class="g2" style="margin-bottom:14px">
        <div class="fg"><label>Tipo servizio</label><select id="edit-tipo">\${to}</select></div>
        <div class="fg"><label>Stato</label><select id="edit-stato">\${so}</select></div>
        <div class="fg"><label>Cliente</label><select id="edit-cl">\${clOpts}</select></div>
        <div class="fg"><label>Numero pratica</label><input id="edit-num" value="\${p.numero||''}"></div>
        <div class="fg"><label>Targa</label><input id="edit-targa" value="\${p.targa||''}" style="text-transform:uppercase"></div>
        <div class="fg"><label>Scadenza</label><input id="edit-scad" type="date" value="\${p.scadenza||''}"></div>
      </div>
      <div class="fg"><label>Titolo</label><input id="edit-titolo" value="\${p.titolo}"></div>
      <div class="fg"><label>Note interne</label><textarea id="edit-note">\${p.note||''}</textarea></div>
      <button class="bp" id="btnSalvaEdit">💾 Salva modifiche</button>
    </div>\`:\`<div class="card">
      <div class="g3">
        <div><div class="sm muted">Tipo servizio</div><div style="font-weight:600;margin-top:4px;font-size:14px">\${p.tipo}</div></div>
        <div><div class="sm muted">Targa</div><div style="font-weight:600;margin-top:4px;font-size:18px;letter-spacing:.05em">\${p.targa||'—'}</div></div>
        <div><div class="sm muted">Scadenza</div><div style="font-weight:600;margin-top:4px">\${p.scadenza||'—'}</div></div>
      </div>
    </div>\`}

    <div class="card">
      <div class="sh">
        <span class="st">Documenti\${isAdmin?\` <span class="sm muted">(\${files.filter(f=>f.visibile).length} visibili al cliente)</span>\`:\` (\${vf.length})\`}</span>
        \${isAdmin?\`<div style="display:flex;gap:6px">
          <button class="bsm" id="btnSelT">✓ Tutti</button>
          <button class="bsm" id="btnDesT">✗ Nessuno</button>
        </div>\`:''}
      </div>
      \${isAdmin?\`<div class="uda" id="dz">
        <input type="file" id="fi" multiple>
        <div class="uda-ic">📁</div>
        <div class="uda-t">Trascina i file qui oppure <strong>clicca per selezionare</strong></div>
        <div class="uda-s">PDF, immagini, documenti · Max 50MB</div>
      </div>
      <div id="us" class="sm muted" style="margin-bottom:10px"></div>\`:''}
      \${!vf.length?\`<div class="sm muted" style="padding:10px 0">Nessun documento disponibile.</div>\`:''}
      <div id="fl">\${vf.map(f=>tFR(f,isAdmin)).join('')}</div>
    </div>

    <div class="card">
      <div class="sh"><span class="st">Messaggi</span></div>
      <div class="ml" id="ml">
        \${!(p.messaggi||[]).length?\`<div class="sm muted">Nessun messaggio.</div>\`:''}
        \${(p.messaggi||[]).map(m=>\`<div class="mb \${m.da==='admin'?'ma':'mc'}"><div>\${m.testo}</div><div class="mm">\${m.da==='admin'?'Studio':'Cliente'} · \${m.ts}</div></div>\`).join('')}
      </div>
      <div class="mi"><input id="nm" placeholder="Scrivi un messaggio..."><button class="bp" id="btnM">Invia</button></div>
    </div>
  </div>\`

  el('btnBack').onclick=()=>{S.sel=null;renderAdmin()}

  if(isAdmin){
    el('btnDelP').onclick=async()=>{
      if(!confirm('Eliminare questa pratica?'))return
      await DEL(\`/api/pratiche/\${p.id}\`);S.sel=null;renderAdmin()
    }
    el('btnSalvaEdit').onclick=async()=>{
      const body={
        titolo:val('edit-titolo').trim(),
        tipo:val('edit-tipo'),
        stato:val('edit-stato'),
        clienteId:val('edit-cl'),
        numero:val('edit-num'),
        targa:val('edit-targa').toUpperCase(),
        scadenza:val('edit-scad'),
        note:val('edit-note')
      }
      await PUT(\`/api/pratiche/\${p.id}\`,body)
      renderAdmin()
    }
    el('btnSelT').onclick=async()=>{for(const f of files)await PUT(\`/api/pratiche/\${p.id}/files/\${f.id}\`,{visibile:true});renderAdmin()}
    el('btnDesT').onclick=async()=>{for(const f of files)await PUT(\`/api/pratiche/\${p.id}/files/\${f.id}\`,{visibile:false});renderAdmin()}
    const dz=el('dz'),fi=el('fi')
    dz.onclick=()=>fi.click()
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')}
    dz.ondragleave=()=>dz.classList.remove('drag')
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');uploadF(e.dataTransfer.files)}
    fi.onchange=()=>uploadF(fi.files)
    async function uploadF(files){
      if(!files.length)return
      el('us').innerHTML='<span class="sp"></span> Caricamento...'
      const fd=new FormData()
      for(const f of files)fd.append('files',f)
      const nuovi=await POST(\`/api/pratiche/\${p.id}/files\`,fd,true)
      el('us').textContent=\`✓ \${nuovi.length} file caricati\`
      const p2=await GET(\`/api/pratiche/\${p.id}\`)
      el('fl').innerHTML=p2.files.map(f=>tFR(f,true)).join('')
      bindFC(p.id)
    }
    bindFC(p.id)
  }

  const invia=async()=>{
    const inp=el('nm'),txt=inp.value.trim();if(!txt)return
    await POST(\`/api/pratiche/\${p.id}/messaggi\`,{testo:txt})
    inp.value=''
    const p2=await GET(\`/api/pratiche/\${p.id}\`)
    el('ml').innerHTML=(p2.messaggi||[]).map(m=>\`<div class="mb \${m.da==='admin'?'ma':'mc'}"><div>\${m.testo}</div><div class="mm">\${m.da==='admin'?'Studio':'Cliente'} · \${m.ts}</div></div>\`).join('')
    el('ml').scrollTop=el('ml').scrollHeight
  }
  el('btnM').onclick=invia
  el('nm').addEventListener('keydown',e=>{if(e.key==='Enter')invia()})
  el('ml').scrollTop=el('ml').scrollHeight
}

function tFR(f,isAdmin){
  return \`<div class="fr" id="fr-\${f.id}">
    <span class="fi">\${icF(f.nome)}</span>
    <span class="fn" title="\${f.nome}">\${f.nome}</span>
    <span class="fd">\${fmtD(f.dim)}</span>
    \${isAdmin?\`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0">
      <input type="checkbox" class="fc fv" data-fid="\${f.id}" \${f.visibile?'checked':''}><span class="sm muted">visibile</span>
    </label>
    <button class="bsm bdel df" data-fid="\${f.id}" style="padding:4px 8px">✕</button>\`:''}
    <a href="\${f.url}" target="_blank" style="text-decoration:none;color:var(--act)" class="bsm">↗ Apri</a>
  </div>\`
}

function bindFC(pid){
  document.querySelectorAll('.fv').forEach(cb=>{
    cb.onchange=async()=>await PUT(\`/api/pratiche/\${pid}/files/\${cb.dataset.fid}\`,{visibile:cb.checked})
  })
  document.querySelectorAll('.df').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('Eliminare questo file?'))return
      await DEL(\`/api/pratiche/\${pid}/files/\${btn.dataset.fid}\`)
      el('fr-'+btn.dataset.fid)?.remove()
    }
  })
}

    S.form=false;renderAdmin()

  document.querySelectorAll('.dcl').forEach(b=>{

      if(!confirm('Eliminare questo cliente?'))return
      await DEL('/api/clienti/'+b.dataset.id);renderAdmin()
    }

      <button class="bsm" id="btnBCl" style="margin-bottom:18px;background:var(--sur)">← Le mie pratiche</button>

        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px">

function el(id){return document.getElementById(id)}
function val(id,s){const e=el(id);if(!e)return'';if(s!==undefined){e.value=s;return}return e.value}
function icF(n=''){const e=n.split('.').pop().toLowerCase();return{pdf:'📄',jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜',rar:'🗜',mp4:'🎬',mov:'🎬',mp3:'🎵'}[e]||'📁'}
function fmtD(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
</script>
