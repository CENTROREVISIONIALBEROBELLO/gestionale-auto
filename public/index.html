<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Consulenze Auto — Portale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap');
:root{--bg:#f5f4f0;--sur:#fff;--sur2:#f0efe9;--brd:#e2e0d8;--brd2:#cccac0;--tx:#1a1916;--tx2:#6b6960;--tx3:#9e9b90;--ac:#1a4d8f;--acl:#e8eef8;--gn:#1a6b3c;--gnl:#e6f4ec;--am:#8f5a0a;--aml:#fdf0da;--rd:#8f1a1a;--rdl:#fde8e8;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:13.5px;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
.hide{display:none!important}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);padding:36px;width:100%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.login-logo{text-align:center;margin-bottom:26px}
.login-logo .ic{font-size:36px;margin-bottom:8px}
.login-logo h1{font-size:16px;font-weight:500}
.login-logo p{font-size:12px;color:var(--tx3);margin-top:4px}

/* Layout admin */
#admin-app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--sur);border-right:.5px solid var(--brd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh}
.sb-logo{padding:18px 20px 14px;border-bottom:.5px solid var(--brd)}
.sb-logo .ic{font-size:22px;margin-bottom:4px}
.sb-logo .t1{font-size:13px;font-weight:500}
.sb-logo .t2{font-size:11px;color:var(--tx3);margin-top:2px}
.nav{flex:1;padding:8px 0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--tx2);font-size:13px;border-left:2px solid transparent;transition:all .12s}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.on{background:var(--acl);color:var(--ac);border-left-color:var(--ac);font-weight:500}
.nb{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500}
.nb.gr{background:var(--sur2);color:var(--tx2)}
.sb-bot{padding:14px 20px;border-top:.5px solid var(--brd)}
.uav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.uav-ic{width:30px;height:30px;border-radius:50%;background:var(--acl);color:var(--ac);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center}
.uav-n{font-size:12.5px;font-weight:500}
.uav-r{font-size:10.5px;color:var(--tx3)}
.admin-main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* Layout cliente */
#cliente-app{min-height:100vh;background:var(--bg)}
.client-header{background:var(--ac);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.client-header .logo{font-weight:500;font-size:15px}
.client-body{padding:20px;max-width:720px;margin:0 auto}

/* Topbar */
.topbar{background:var(--sur);border-bottom:.5px solid var(--brd);padding:0 22px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.tb-t{font-size:14.5px;font-weight:500}
.tb-s{font-size:12px;color:var(--tx3)}
.tb-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{padding:20px 22px}

/* Forms */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:8px 10px;border:.5px solid var(--brd2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac)}
textarea{resize:vertical;min-height:68px;line-height:1.5}

/* Buttons */
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;border-radius:var(--rs);border:.5px solid var(--brd2);background:var(--sur);color:var(--tx);transition:all .12s;white-space:nowrap}
button:hover{background:var(--sur2)}
button:active{transform:scale(.98)}
.bp{background:var(--ac);color:#fff;border-color:var(--ac)}
.bp:hover{background:#163f76}
.bsm{padding:5px 10px;font-size:12px}
.bdel{background:var(--rdl);color:var(--rd);border-color:#f5c0c0}

/* Cards */
.card{background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Badge */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.bam{background:var(--aml);color:var(--am)}
.bbl{background:var(--acl);color:var(--ac)}
.bgn{background:var(--gnl);color:var(--gn)}
.brd2{background:var(--rdl);color:var(--rd)}
.bgr{background:var(--sur2);color:var(--tx2)}

/* Stat */
.stat{background:var(--sur2);border-radius:var(--rs);padding:14px 16px}
.sl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sv{font-size:26px;font-weight:300}

/* Pratica row */
.pr{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--sur);border:.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.pr:hover{border-color:var(--brd2);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.pr-info{flex:1;min-width:0}
.pr-t{font-weight:500;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-m{font-size:11.5px;color:var(--tx2);margin-top:3px}
.pr-c{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);margin-top:2px}

/* File rows */
.fr{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);transition:background .1s}
.fr:hover{background:var(--sur2)}
.fi{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.fn{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd{font-size:11px;color:var(--tx3);white-space:nowrap}
.fc{width:15px;height:15px;cursor:pointer;accent-color:var(--ac);flex-shrink:0}

/* Messaggi */
.ml{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-bottom:12px}
.mb{padding:9px 13px;border-radius:var(--r);max-width:82%}
.ma{background:var(--acl);color:var(--ac);align-self:flex-end}
.mc{background:var(--sur2);color:var(--tx);align-self:flex-start}
.mm{font-size:10px;opacity:.55;margin-top:3px}
.mi{display:flex;gap:8px}
.mi input{flex:1}

/* Upload area */
.upload-area{border:1.5px dashed var(--brd2);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;transition:border-color .12s,background .12s;margin-bottom:8px}
.upload-area:hover,.upload-area.drag{border-color:var(--ac);background:var(--acl)}
.upload-area input{display:none}

/* Misc */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:14.5px;font-weight:500}
.dv{height:.5px;background:var(--brd);margin:12px 0}
.muted{color:var(--tx3)}
.sm{font-size:12px}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.err{color:var(--rd);font-size:12px;margin-top:5px}
.ib{background:var(--acl);border:.5px solid #b8cde8;border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:var(--ac);margin-bottom:12px}
.empty{text-align:center;padding:48px 24px;color:var(--tx3)}
.ei{font-size:32px;margin-bottom:10px}
.sp{display:inline-block;width:13px;height:13px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:48px;color:var(--tx3)}

@media(max-width:640px){
  .sidebar{display:none}
  .admin-main{margin-left:0}
  .g2,.g3{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .content{padding:14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="ic">🚗</div><h1>Studio Consulenze Auto</h1><p>Portale pratiche</p></div>
    <div class="fg"><label>Username</label><input id="lu" type="text" placeholder="Inserisci username" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="Inserisci password" autocomplete="current-password"></div>
    <div id="lerr" class="err hide"></div>
    <button class="bp" id="btnLogin" style="width:100%;margin-top:10px">Accedi</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-app" class="hide">
  <aside class="sidebar">
    <div class="sb-logo"><div class="ic">🚗</div><div class="t1">Consulenze Auto</div><div class="t2">Pannello admin</div></div>
    <nav class="nav">
      <div class="ni" data-nav="pratiche"><span>📋</span>Pratiche<span class="nb" id="nb-pratiche"></span></div>
      <div class="ni" data-nav="clienti"><span>👤</span>Clienti<span class="nb gr" id="nb-clienti">0</span></div>
    </nav>
    <div class="sb-bot">
      <div class="uav"><div class="uav-ic">AD</div><div><div class="uav-n">Admin</div><div class="uav-r">Studio</div></div></div>
      <button class="bsm" id="btnLogout" style="width:100%">Esci</button>
    </div>
  </aside>
  <div class="admin-main">
    <div id="admin-content"></div>
  </div>
</div>

<!-- CLIENTE -->
<div id="cliente-app" class="hide">
  <div class="client-header">
    <span class="logo">🚗 Studio Consulenze Auto</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="cl-nome" style="font-size:13px;opacity:.9"></span>
      <button id="btnLogoutCl" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" class="bsm">Esci</button>
    </div>
  </div>
  <div class="client-body" id="cliente-content"></div>
</div>

<script>
// ── Stato ─────────────────────────────────────────────────────────────────────
const S = { ruolo:null, utente:null, vista:'pratiche', praticaSel:null, showForm:false }
const STATI  = { attesa:'In attesa', lavorazione:'In lavorazione', completata:'Completata', annullata:'Annullata' }
const SB     = { attesa:'bam', lavorazione:'bbl', completata:'bgn', annullata:'brd2' }
const TIPI   = ['Immatricolazione','Passaggio proprietà','Revisione','Bollo','Assicurazione','Rottamazione','Duplicato','Altro']

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, url, body, isFormData) {
  const opts = { method, headers: {} }
  if (body && isFormData)  { opts.body = body }
  else if (body)           { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body) }
  const r = await fetch(url, opts)
  return r.json()
}
const GET  = url       => api('GET',    url)
const POST = (url, b, fd) => api('POST', url, b, fd)
const PUT  = (url, b)  => api('PUT',    url, b)
const DEL  = url       => api('DELETE', url)

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const me = await GET('/api/me')
  if (me.loggato) { S.ruolo=me.ruolo; S.utente=me; avvia() }
})

function avvia() {
  el('login-screen').classList.add('hide')
  if (S.ruolo==='admin')   { el('admin-app').classList.remove('hide');   renderAdmin() }
  if (S.ruolo==='cliente') { el('cliente-app').classList.remove('hide'); renderCliente() }
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
el('btnLogin').addEventListener('click', doLogin)
el('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin() })

async function doLogin() {
  el('lerr').classList.add('hide')
  const r = await POST('/api/login', { username: val('lu'), password: val('lp') })
  if (r.ok) { S.ruolo=r.ruolo; S.utente=r; avvia() }
  else { el('lerr').textContent=r.errore||'Errore'; el('lerr').classList.remove('hide') }
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
async function doLogout() {
  await POST('/api/logout')
  S.ruolo=null; S.utente=null; S.praticaSel=null; S.showForm=false
  el('admin-app').classList.add('hide')
  el('cliente-app').classList.add('hide')
  el('login-screen').classList.remove('hide')
  val('lp','')
}
el('btnLogout').addEventListener('click', doLogout)
el('btnLogoutCl').addEventListener('click', doLogout)

// ─────────────────────────────────────────────────────────────────────────────
// ADMIN
// ─────────────────────────────────────────────────────────────────────────────
function renderAdmin() {
  document.querySelectorAll('.ni').forEach(n => {
    n.classList.toggle('on', n.dataset.nav===S.vista)
    n.onclick = () => { S.vista=n.dataset.nav; S.showForm=false; S.praticaSel=null; renderAdmin() }
  })
  const c = el('admin-content')
  if (S.vista==='pratiche' && S.praticaSel) { renderDettaglio(true); return }
  if (S.vista==='pratiche')  { renderListaPratiche(); return }
  if (S.vista==='clienti')   { renderClienti(); return }
}

// ── Lista pratiche ─────────────────────────────────────────────────────────
async function renderListaPratiche() {
  const c = el('admin-content')
  c.innerHTML = `<div class="topbar"><div><div class="tb-t">Pratiche</div></div><div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div></div><div class="content"><div class="loading"><span class="sp"></span> Caricamento...</div></div>`

  const pratiche = await GET('/api/pratiche')
  const clienti  = await GET('/api/clienti')
  el('nb-pratiche').textContent = pratiche.length || ''

  const rows = pratiche.map(p => {
    const cl  = clienti.find(c=>c.id===p.clienteId)
    const vis = (p.files||[]).filter(f=>f.visibile).length
    return `<div class="pr" data-pid="${p.id}">
      <div class="pr-info">
        <div class="pr-t">${p.titolo}</div>
        <div class="pr-m">${cl?cl.nome:'—'} · ${p.tipo} · Targa: <strong>${p.targa||'—'}</strong> · Scad: ${p.scadenza||'—'} · ${vis} doc visibili</div>
        <div class="pr-c">Pratica: ${p.numero||p.id} · Cliente: ${cl?cl.codice:'—'}</div>
      </div>
      <span class="badge ${SB[p.stato]}">${STATI[p.stato]}</span>
    </div>`
  }).join('')

  c.innerHTML = `
    <div class="topbar">
      <div><div class="tb-t">Pratiche</div><div class="tb-s">${pratiche.length} totali</div></div>
      <div class="tb-r"><button class="bp" id="btnNP">+ Nuova pratica</button></div>
    </div>
    <div class="content">
      ${S.showForm ? await tFormPratica(clienti) : ''}
      ${!pratiche.length&&!S.showForm?`<div class="empty"><div class="ei">📂</div><p>Nessuna pratica.</p></div>`:''}
      ${rows}
    </div>`

  el('btnNP').onclick = () => { S.showForm=!S.showForm; renderAdmin() }
  document.querySelectorAll('[data-pid]').forEach(r => {
    r.onclick = e => { if(e.target.closest('button')) return; S.praticaSel=r.dataset.pid; renderAdmin() }
  })
  if (S.showForm) bindFormPratica(clienti)
}

async function tFormPratica(clienti) {
  const co = clienti.map(c=>`<option value="${c.id}">${c.codice} — ${c.nome}</option>`).join('')
  const to = TIPI.map(t=>`<option>${t}</option>`).join('')
  const so = Object.entries(STATI).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')
  return `<div class="card" style="border-color:var(--ac);margin-bottom:16px" id="formPratica">
    <div class="sh"><span class="st">Nuova pratica</span></div>
    <div class="g2">
      <div class="fg"><label>Cliente</label><select id="np-cl">${co}</select></div>
      <div class="fg"><label>Tipo pratica</label><select id="np-tipo">${to}</select></div>
      <div class="fg"><label>Numero pratica</label><input id="np-num" placeholder="es. 2024-001"></div>
      <div class="fg"><label>Titolo</label><input id="np-titolo" placeholder="es. Immatricolazione Fiat 500"></div>
      <div class="fg"><label>Targa</label><input id="np-targa" placeholder="AB123CD"></div>
      <div class="fg"><label>Scadenza</label><input id="np-scad" type="date"></div>
      <div class="fg"><label>Stato</label><select id="np-stato">${so}</select></div>
    </div>
    <div class="fg"><label>Note interne</label><textarea id="np-note"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="bp" id="btnSalvaP">Salva pratica</button>
      <button id="btnAnnullaP">Annulla</button>
    </div>
  </div>`
}

function bindFormPratica(clienti) {
  el('btnAnnullaP').onclick = () => { S.showForm=false; renderAdmin() }
  el('btnSalvaP').onclick   = async () => {
    const titolo=val('np-titolo').trim(), clienteId=val('np-cl')
    if(!titolo||!clienteId){ alert('Inserisci titolo e cliente'); return }
    await POST('/api/pratiche', { titolo, clienteId, numero:val('np-num'), tipo:val('np-tipo'), targa:val('np-targa'), stato:val('np-stato'), scadenza:val('np-scad'), note:val('np-note') })
    S.showForm=false; renderAdmin()
  }
}

// ── Dettaglio pratica ──────────────────────────────────────────────────────
async function renderDettaglio(isAdmin) {
  const c = el('admin-content')
  c.innerHTML = `<div class="loading"><span class="sp"></span> Caricamento...</div>`

  const p  = await GET(`/api/pratiche/${S.praticaSel}`)
  const cl = isAdmin ? (await GET('/api/clienti')).find(x=>x.id===p.clienteId) : null
  const files = p.files||[]
  const vfiles = isAdmin ? files : files.filter(f=>f.visibile)
  const so = Object.entries(STATI).map(([k,v])=>`<option value="${k}" ${p.stato===k?'selected':''}>${v}</option>`).join('')

  const html = `
  <div class="topbar">
    <button class="bsm" id="btnBack">← Indietro</button>
    <div style="margin-left:8px"><div class="tb-t">${p.titolo}</div><div class="tb-s">Pratica ${p.numero||p.id}${cl?' · '+cl.nome:''}</div></div>
    ${isAdmin?`<div class="tb-r"><select id="selStato" style="width:auto">${so}</select><button class="bdel bsm" id="btnDelP">Elimina</button></div>`
             :`<div class="tb-r"><span class="badge ${SB[p.stato]}">${STATI[p.stato]}</span></div>`}
  </div>
  <div class="content">
    <div class="card">
      <div class="g3">
        <div><div class="sm muted">Tipo</div><div style="font-weight:500">${p.tipo}</div></div>
        <div><div class="sm muted">Targa</div><div style="font-weight:500;font-size:15px">${p.targa||'—'}</div></div>
        <div><div class="sm muted">Scadenza</div><div style="font-weight:500">${p.scadenza||'—'}</div></div>
      </div>
      ${p.note&&isAdmin?`<div class="dv"></div><div class="sm" style="color:var(--tx2)">${p.note}</div>`:''}
    </div>

    <div class="card">
      <div class="sh">
        <span class="st">Documenti${isAdmin?` — ${files.filter(f=>f.visibile).length} visibili al cliente`:` (${vfiles.length})`}</span>
        ${isAdmin?`<button class="bsm bp" id="btnUpload">+ Carica file</button>`:''}
      </div>
      ${isAdmin?`<div class="upload-area" id="dropZone">
        <input type="file" id="fileInput" multiple>
        <div>📁 Trascina i file qui oppure <strong>clicca per selezionare</strong></div>
        <div class="sm muted" style="margin-top:4px">Max 20MB per file</div>
      </div>
      <div id="uploadStatus" class="sm muted" style="margin-bottom:8px"></div>`:''}
      ${!vfiles.length?`<div class="sm muted">Nessun documento.</div>`:''}
      <div id="fileList">
        ${vfiles.map(f=>tFileRow(f,isAdmin)).join('')}
      </div>
    </div>

    <div class="card">
      <div class="sh"><span class="st">Messaggi</span></div>
      <div class="ml" id="msgList">
        ${!(p.messaggi||[]).length?`<div class="sm muted">Nessun messaggio.</div>`:''}
        ${(p.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Cliente'} · ${m.ts}</div></div>`).join('')}
      </div>
      <div class="mi"><input id="newMsg" placeholder="Scrivi un messaggio..."><button class="bp" id="btnMsg">Invia</button></div>
    </div>
  </div>`

  c.innerHTML = html

  el('btnBack').onclick = () => { S.praticaSel=null; renderAdmin() }

  if (isAdmin) {
    const ss = el('selStato')
    if(ss) ss.onchange = async () => { await PUT(`/api/pratiche/${p.id}`, { stato:ss.value }); renderAdmin() }

    el('btnDelP').onclick = async () => {
      if(!confirm('Eliminare questa pratica?')) return
      await DEL(`/api/pratiche/${p.id}`); S.praticaSel=null; renderAdmin()
    }

    // Upload file
    const dropZone = el('dropZone')
    const fileInput = el('fileInput')
    dropZone.onclick = () => fileInput.click()
    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag') }
    dropZone.ondragleave = () => dropZone.classList.remove('drag')
    dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFiles(e.dataTransfer.files) }
    fileInput.onchange = () => uploadFiles(fileInput.files)

    async function uploadFiles(files) {
      if(!files.length) return
      el('uploadStatus').innerHTML = '<span class="sp"></span> Caricamento...'
      const fd = new FormData()
      for(const f of files) fd.append('files', f)
      const nuovi = await POST(`/api/pratiche/${p.id}/files`, fd, true)
      el('uploadStatus').textContent = `${nuovi.length} file caricati`
      // Aggiorna lista file
      const p2 = await GET(`/api/pratiche/${p.id}`)
      el('fileList').innerHTML = p2.files.map(f=>tFileRow(f,true)).join('')
      bindFileChecks(p.id)
    }

    bindFileChecks(p.id)
  }

  // Messaggi
  const invia = async () => {
    const inp=el('newMsg'), txt=inp.value.trim(); if(!txt) return
    await POST(`/api/pratiche/${p.id}/messaggi`, { testo:txt })
    inp.value=''
    const p2 = await GET(`/api/pratiche/${p.id}`)
    el('msgList').innerHTML = (p2.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Cliente'} · ${m.ts}</div></div>`).join('')
    el('msgList').scrollTop = el('msgList').scrollHeight
  }
  el('btnMsg').onclick = invia
  el('newMsg').addEventListener('keydown', e=>{ if(e.key==='Enter') invia() })
  el('msgList').scrollTop = el('msgList').scrollHeight
}

function tFileRow(f, isAdmin) {
  const ic = icFile(f.nome)
  return `<div class="fr" id="fr-${f.id}">
    <span class="fi">${ic}</span>
    <span class="fn" title="${f.nome}">${f.nome}</span>
    <span class="fd">${fmtDim(f.dim)}</span>
    ${isAdmin?`<label style="display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0">
      <input type="checkbox" class="fc file-vis" data-fid="${f.id}" ${f.visibile?'checked':''}> <span style="font-size:11px;color:var(--tx3)">visibile</span>
    </label>
    <button class="bsm bdel del-file" data-fid="${f.id}" style="padding:3px 7px">✕</button>`:''}
    <a href="${f.url}" target="_blank" class="bsm" style="text-decoration:none;padding:5px 10px">↗</a>
  </div>`
}

function bindFileChecks(praticaId) {
  document.querySelectorAll('.file-vis').forEach(cb => {
    cb.onchange = async () => {
      await PUT(`/api/pratiche/${praticaId}/files/${cb.dataset.fid}`, { visibile: cb.checked })
    }
  })
  document.querySelectorAll('.del-file').forEach(btn => {
    btn.onclick = async () => {
      if(!confirm('Eliminare questo file?')) return
      await DEL(`/api/pratiche/${praticaId}/files/${btn.dataset.fid}`)
      el('fr-'+btn.dataset.fid)?.remove()
    }
  })
}

// ── Clienti ────────────────────────────────────────────────────────────────
async function renderClienti() {
  const c = el('admin-content')
  c.innerHTML = `<div class="topbar"><div><div class="tb-t">Clienti</div></div><div class="tb-r"><button class="bp" id="btnNC">+ Nuovo cliente</button></div></div><div class="content"><div class="loading"><span class="sp"></span></div></div>`

  const clienti = await GET('/api/clienti')
  el('nb-clienti').textContent = clienti.length

  const rows = clienti.map(cl => {
    const np = 0
    return `<div class="card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div>
          <div style="font-weight:500;font-size:14px">${cl.nome} <span class="badge bgr" style="font-size:10px">${cl.codice}</span></div>
          <div class="sm muted" style="margin-top:3px">${cl.email||''} ${cl.telefono?'· '+cl.telefono:''}</div>
          <div class="sm" style="margin-top:4px">Login: <span class="mono">${cl.username}</span> / <span class="mono">${cl.password}</span></div>
        </div>
        <button class="bdel bsm del-cl" data-id="${cl.id}">Elimina</button>
      </div>
    </div>`
  }).join('')

  c.innerHTML = `
    <div class="topbar">
      <div><div class="tb-t">Clienti</div><div class="tb-s">${clienti.length} registrati</div></div>
      <div class="tb-r"><button class="bp" id="btnNC">+ Nuovo cliente</button></div>
    </div>
    <div class="content">
      ${S.showForm ? `<div class="card" style="border-color:var(--ac);margin-bottom:16px" id="formCl">
        <div class="sh"><span class="st">Nuovo cliente</span></div>
        <div class="ib">Il codice viene assegnato automaticamente</div>
        <div class="g2">
          <div class="fg"><label>Nome completo</label><input id="nc-nome" placeholder="Mario Rossi"></div>
          <div class="fg"><label>Email</label><input id="nc-email" placeholder="mario@email.it"></div>
          <div class="fg"><label>Telefono</label><input id="nc-tel" placeholder="348 0000000"></div>
          <div class="fg"><label>Username</label><input id="nc-user" placeholder="mario.rossi"></div>
          <div class="fg"><label>Password</label><input id="nc-pass" placeholder="Password accesso"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="bp" id="btnSalvaCl">Salva cliente</button>
          <button id="btnAnnullaCl">Annulla</button>
        </div>
      </div>` : ''}
      ${!clienti.length&&!S.showForm?`<div class="empty"><div class="ei">👤</div><p>Nessun cliente.</p></div>`:''}
      ${rows}
    </div>`

  el('btnNC').onclick = () => { S.showForm=!S.showForm; renderClienti() }
  if(el('btnAnnullaCl')) el('btnAnnullaCl').onclick = () => { S.showForm=false; renderClienti() }
  if(el('btnSalvaCl')) el('btnSalvaCl').onclick = async () => {
    const nome=val('nc-nome').trim(), username=val('nc-user').trim(), password=val('nc-pass').trim()
    if(!nome||!username||!password){ alert('Compila nome, username e password'); return }
    await POST('/api/clienti', { nome, email:val('nc-email'), telefono:val('nc-tel'), username, password })
    S.showForm=false; renderClienti()
  }
  document.querySelectorAll('.del-cl').forEach(b => {
    b.onclick = async () => {
      if(!confirm('Eliminare questo cliente?')) return
      await DEL('/api/clienti/'+b.dataset.id); renderClienti()
    }
  })
}

// ─────────────────────────────────────────────────────────────────────────────
// CLIENTE
// ─────────────────────────────────────────────────────────────────────────────
async function renderCliente() {
  el('cl-nome').textContent = S.utente.nome + ' · ' + (S.utente.codice||'')

  if (S.praticaSel) {
    const cc = el('cliente-content')
    cc.innerHTML = `<div class="loading"><span class="sp"></span> Caricamento...</div>`
    const p = await GET(`/api/pratiche/${S.praticaSel}`)
    const vfiles = (p.files||[]).filter(f=>f.visibile)

    cc.innerHTML = `
      <button class="bsm" id="btnBackCl" style="margin-bottom:14px">← Torna alle pratiche</button>
      <div class="card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div><div style="font-weight:500;font-size:15px">${p.titolo}</div><div class="sm muted" style="margin-top:3px">Pratica n° ${p.numero||p.id}</div></div>
          <span class="badge ${SB[p.stato]}">${STATI[p.stato]}</span>
        </div>
        <div class="dv"></div>
        <div class="g3">
          <div><div class="sm muted">Tipo</div><div style="font-weight:500">${p.tipo}</div></div>
          <div><div class="sm muted">Targa</div><div style="font-weight:500;font-size:15px">${p.targa||'—'}</div></div>
          <div><div class="sm muted">Scadenza</div><div style="font-weight:500">${p.scadenza||'—'}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="sh"><span class="st">Documenti (${vfiles.length})</span></div>
        ${!vfiles.length?`<div class="sm muted">Nessun documento disponibile al momento.</div>`:''}
        ${vfiles.map(f=>`<div class="fr">
          <span class="fi">${icFile(f.nome)}</span>
          <span class="fn">${f.nome}</span>
          <span class="fd">${fmtDim(f.dim)}</span>
          <a href="${f.url}" target="_blank" class="bsm" style="text-decoration:none">↗ Apri</a>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="sh"><span class="st">Messaggi</span></div>
        <div class="ml" id="msgList">
          ${!(p.messaggi||[]).length?`<div class="sm muted">Nessun messaggio.</div>`:''}
          ${(p.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Tu'} · ${m.ts}</div></div>`).join('')}
        </div>
        <div class="mi"><input id="newMsg" placeholder="Scrivi un messaggio..."><button class="bp" id="btnMsg">Invia</button></div>
      </div>`

    el('btnBackCl').onclick = () => { S.praticaSel=null; renderCliente() }
    el('msgList').scrollTop = el('msgList').scrollHeight

    const invia = async () => {
      const inp=el('newMsg'), txt=inp.value.trim(); if(!txt) return
      await POST(`/api/pratiche/${p.id}/messaggi`, { testo:txt })
      inp.value=''
      const p2=await GET(`/api/pratiche/${p.id}`)
      el('msgList').innerHTML=(p2.messaggi||[]).map(m=>`<div class="mb ${m.da==='admin'?'ma':'mc'}"><div>${m.testo}</div><div class="mm">${m.da==='admin'?'Studio':'Tu'} · ${m.ts}</div></div>`).join('')
      el('msgList').scrollTop=el('msgList').scrollHeight
    }
    el('btnMsg').onclick=invia
    el('newMsg').addEventListener('keydown',e=>{ if(e.key==='Enter') invia() })
    return
  }

  const pratiche = await GET('/api/pratiche')
  const cc = el('cliente-content')
  cc.innerHTML = `
    <div class="g2" style="margin-bottom:20px">
      <div class="stat"><div class="sl">Pratiche totali</div><div class="sv">${pratiche.length}</div></div>
      <div class="stat"><div class="sl">In lavorazione</div><div class="sv">${pratiche.filter(p=>p.stato==='lavorazione').length}</div></div>
    </div>
    ${!pratiche.length?`<div class="empty"><div class="ei">📂</div><p>Nessuna pratica al momento.</p></div>`:''}
    ${pratiche.map(p=>{
      const vis=(p.files||[]).filter(f=>f.visibile).length
      return `<div class="pr" data-pid="${p.id}">
        <div class="pr-info">
          <div class="pr-t">${p.titolo}</div>
          <div class="pr-m">Targa: <strong>${p.targa||'—'}</strong> · Scad: ${p.scadenza||'—'} · ${vis} documenti</div>
          <div class="pr-c">Pratica n° ${p.numero||p.id}</div>
        </div>
        <span class="badge ${SB[p.stato]}">${STATI[p.stato]}</span>
      </div>`
    }).join('')}`

  document.querySelectorAll('[data-pid]').forEach(r => {
    r.onclick = () => { S.praticaSel=r.dataset.pid; renderCliente() }
  })
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id) }
function val(id, set) { const e=el(id); if(!e) return ''; if(set!==undefined){e.value=set;return} return e.value }
function icFile(n='') {
  const e=(n).split('.').pop().toLowerCase()
  return {pdf:'📄',jpg:'🖼',jpeg:'🖼',png:'🖼',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'🗜',rar:'🗜',mp4:'🎬',mov:'🎬'}[e]||'📁'
}
function fmtDim(b) {
  if(!b) return ''
  if(b<1024) return b+'B'
  if(b<1048576) return (b/1024).toFixed(1)+'KB'
  return (b/1048576).toFixed(1)+'MB'
}
